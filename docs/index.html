<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>薬価基準ビューア</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #f5f6f8;
    color: #222;
  }

  header {
    background: #1a4e8c;
    color: #fff;
    padding: 12px 20px;
    display: flex;
    align-items: baseline;
    gap: 12px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header span { font-size: 12px; opacity: .7; }

  #controls {
    background: #fff;
    border-bottom: 1px solid #dde1e7;
    padding: 12px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
  }

  #controls input[type=text] {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 6px 10px;
    width: 260px;
    font-size: 14px;
  }

  #controls select {
    border: 1px solid #ccc;
    border-radius: 4px;
    padding: 6px 8px;
    font-size: 14px;
    background: #fff;
  }

  #controls label {
    display: flex;
    align-items: center;
    gap: 5px;
    cursor: pointer;
    white-space: nowrap;
  }

  #controls .version-select { margin-left: auto; }

  #summary {
    padding: 8px 20px;
    font-size: 12px;
    color: #666;
    background: #f5f6f8;
  }

  .table-wrap {
    overflow-x: auto;
    padding: 0 20px 20px;
  }

  table {
    width: 100%;
    border-collapse: collapse;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    border-radius: 6px;
    overflow: hidden;
    min-width: 800px;
  }

  thead th {
    background: #eef1f5;
    text-align: left;
    padding: 9px 12px;
    font-weight: 600;
    font-size: 12px;
    color: #555;
    border-bottom: 1px solid #dde1e7;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
  }
  thead th:hover { background: #e2e6ed; }
  thead th.sorted-asc::after  { content: " ▲"; }
  thead th.sorted-desc::after { content: " ▼"; }

  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: #eef4ff; }

  td {
    padding: 7px 12px;
    border-bottom: 1px solid #eee;
    vertical-align: middle;
  }

  .badge {
    display: inline-block;
    padding: 2px 7px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 600;
    white-space: nowrap;
  }
  .badge-senpatu   { background: #dbeafe; color: #1d4ed8; }
  .badge-junsenpatu{ background: #e0e7ff; color: #4338ca; }
  .badge-kouhatsu  { background: #dcfce7; color: #15803d; }
  .badge-hoshi     { background: #fef9c3; color: #854d0e; }
  .badge-dougaku   { background: #fce7f3; color: #9d174d; }

  .yakka { text-align: right; font-variant-numeric: tabular-nums; }

  #legend {
    background: #fff;
    border-bottom: 1px solid #dde1e7;
    padding: 8px 20px;
    display: flex;
    flex-wrap: wrap;
    gap: 16px;
    font-size: 12px;
    color: #444;
  }
  #legend .item {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #legend .desc { color: #666; }

  #empty {
    text-align: center;
    padding: 40px;
    color: #999;
    display: none;
  }
</style>
</head>
<body>

<header>
  <h1>薬価基準ビューア</h1>
  <span id="ver-label"></span>
</header>

<div id="legend">
  <div class="item"><span class="badge badge-senpatu">先発品</span><span class="desc">新薬として最初に承認された医薬品</span></div>
  <div class="item"><span class="badge badge-junsenpatu">準先発品</span><span class="desc">後発品制度以前（1967年以前）から収載されている先発品</span></div>
  <div class="item"><span class="badge badge-kouhatsu">後発品</span><span class="desc">診療報酬の加算・変更調剤の対象となるジェネリック</span></div>
  <div class="item"><span class="badge badge-hoshi">後発品★</span><span class="desc">後発品だが先発品と同額以上のため加算対象外</span></div>
  <div class="item"><span class="badge badge-dougaku">○同額</span><span class="desc">後発品と同額水準まで薬価が下がった先発品（長期収載品G1等）</span></div>
</div>

<div id="controls">
  <input type="text" id="q" placeholder="品名・成分名・メーカー名で検索...">

  <select id="kubun">
    <option value="">区分：すべて</option>
    <option value="内用薬">内用薬</option>
    <option value="外用薬">外用薬</option>
    <option value="注射薬">注射薬</option>
    <option value="歯科用薬剤">歯科用薬剤</option>
  </select>

  <select id="kind">
    <option value="">種別：すべて</option>
    <option value="senpatu">先発品</option>
    <option value="junsenpatu">準先発品</option>
    <option value="kouhatsu">後発品（加算対象）</option>
    <option value="hoshi">後発品（★加算対象外）</option>
  </select>

  <label><input type="checkbox" id="dougaku"> 先発と後発が同額水準（○）のみ</label>

  <select id="version" class="version-select"></select>
</div>

<div id="summary"></div>

<div class="table-wrap">
  <table id="tbl">
    <thead>
      <tr>
        <th data-col="kubun">区分</th>
        <th data-col="seibun">成分名</th>
        <th data-col="hinmei">品名</th>
        <th data-col="kikaku">規格</th>
        <th data-col="maker">メーカー</th>
        <th data-col="kind">種別</th>
        <th data-col="yakka">薬価</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
  <div id="empty">該当する品目がありません</div>
</div>

<script>
const PAGE = 200;
let allRecords = [];
let filtered = [];
let sortCol = null;
let sortDir = 1;
let page = 0;

// バージョン一覧を自動検出（data/ 以下の yakka_*.json）
const VERSIONS = [
  { label: "2026年4月1日", file: "data/yakka_20260401.json" },
  { label: "2026年3月18日", file: "data/yakka_20260318.json" },
];

async function loadVersion(file) {
  const res = await fetch(file);
  const json = await res.json();
  allRecords = json.records;
  document.getElementById("ver-label").textContent = `収載日: ${json.version.replace(/(\d{4})(\d{2})(\d{2})/, "$1/$2/$3")}`;
  applyFilter();
}

function kindOf(r) {
  if (r.senpatu === "先発品")   return "senpatu";
  if (r.senpatu === "準先発品") return "junsenpatu";
  if (r.kouhatsu === "後発品")  return "kouhatsu";
  if (r.kouhatsu === "★")       return "hoshi";
  return "other";
}

function kindBadge(r) {
  const k = kindOf(r);
  const map = {
    senpatu:    ["badge-senpatu",    "先発品"],
    junsenpatu: ["badge-junsenpatu", "準先発品"],
    kouhatsu:   ["badge-kouhatsu",   "後発品"],
    hoshi:      ["badge-hoshi",      "後発品★"],
    other:      ["",                 ""],
  };
  const [cls, label] = map[k];
  if (!label) return "";
  let html = `<span class="badge ${cls}">${label}</span>`;
  if (r.dougaku) html += ` <span class="badge badge-dougaku">○同額</span>`;
  return html;
}

function applyFilter() {
  const q      = document.getElementById("q").value.trim().toLowerCase();
  const kubun  = document.getElementById("kubun").value;
  const kind   = document.getElementById("kind").value;
  const dougaku = document.getElementById("dougaku").checked;

  filtered = allRecords.filter(r => {
    if (kubun && r.kubun !== kubun) return false;
    if (dougaku && !r.dougaku) return false;
    if (kind && kindOf(r) !== kind) return false;
    if (q) {
      const hay = (r.hinmei + r.seibun + r.maker).toLowerCase();
      if (!hay.includes(q)) return false;
    }
    return true;
  });

  if (sortCol) {
    filtered.sort((a, b) => {
      let av = a[sortCol] ?? "", bv = b[sortCol] ?? "";
      if (typeof av === "number" && typeof bv === "number") return (av - bv) * sortDir;
      return String(av).localeCompare(String(bv), "ja") * sortDir;
    });
  }

  page = 0;
  render();
}

function render() {
  const tbody = document.getElementById("tbody");
  const empty = document.getElementById("empty");
  const summary = document.getElementById("summary");

  const slice = filtered.slice(0, (page + 1) * PAGE);
  summary.textContent = `${filtered.length.toLocaleString()} 件 / 全 ${allRecords.length.toLocaleString()} 件`;

  tbody.innerHTML = slice.map(r => `
    <tr>
      <td>${r.kubun}</td>
      <td>${r.seibun}</td>
      <td>${r.hinmei}</td>
      <td>${r.kikaku}</td>
      <td>${r.maker}</td>
      <td>${kindBadge(r)}</td>
      <td class="yakka">${r.yakka != null ? r.yakka.toFixed(1) + " 円" : ""}</td>
    </tr>
  `).join("");

  empty.style.display = filtered.length === 0 ? "block" : "none";
}

// 無限スクロール
window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY >= document.body.offsetHeight - 300) {
    if ((page + 1) * PAGE < filtered.length) {
      page++;
      render();
    }
  }
});

// ソート
document.querySelectorAll("thead th").forEach(th => {
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (col === "kind") return;
    if (sortCol === col) { sortDir *= -1; }
    else { sortCol = col; sortDir = 1; }
    document.querySelectorAll("thead th").forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
    th.classList.add(sortDir === 1 ? "sorted-asc" : "sorted-desc");
    applyFilter();
  });
});

// フィルタ
["q","kubun","kind","dougaku"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyFilter);
  document.getElementById(id).addEventListener("change", applyFilter);
});

// バージョン選択
const sel = document.getElementById("version");
VERSIONS.forEach((v, i) => {
  const opt = document.createElement("option");
  opt.value = v.file;
  opt.textContent = v.label;
  sel.appendChild(opt);
});
sel.addEventListener("change", () => loadVersion(sel.value));

// 初期ロード
loadVersion(VERSIONS[0].file);
</script>
</body>
</html>
