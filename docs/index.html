<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>薬価基準ビューア</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    font-size: 14px;
    background: #f5f6f8;
    color: #222;
  }

  header {
    background: #1a4e8c;
    color: #fff;
    padding: 12px 20px;
  }
  header h1 { font-size: 18px; font-weight: 700; }
  header p  { font-size: 12px; opacity: .75; margin-top: 2px; }

  #tabs {
    display: flex;
    background: #fff;
    border-bottom: 2px solid #dde1e7;
    padding: 0 20px;
  }
  .tab-btn {
    padding: 11px 22px;
    border: none; background: none;
    font-size: 14px; cursor: pointer; color: #666;
    border-bottom: 2px solid transparent; margin-bottom: -2px;
    white-space: nowrap;
  }
  .tab-btn.active { color: #1a4e8c; font-weight: 700; border-bottom-color: #1a4e8c; }

  .controls {
    background: #fff;
    border-bottom: 1px solid #dde1e7;
    padding: 10px 20px;
    display: flex; flex-wrap: wrap; gap: 10px; align-items: center;
  }
  .controls input[type=text] {
    border: 1px solid #ccc; border-radius: 4px;
    padding: 6px 10px; width: 240px; font-size: 14px;
  }
  .controls select {
    border: 1px solid #ccc; border-radius: 4px;
    padding: 6px 8px; font-size: 14px; background: #fff;
  }
  .controls label { display: flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
  .spacer { flex: 1 1 0; }

  .stats-bar {
    display: flex; flex-wrap: wrap; gap: 16px;
    padding: 10px 20px;
    background: #f0f4ff;
    border-bottom: 1px solid #dde1e7;
    font-size: 13px; color: #444;
  }
  .stats-bar .stat { display: flex; flex-direction: column; align-items: center; }
  .stats-bar .stat-num { font-size: 22px; font-weight: 700; color: #1a4e8c; }
  .stats-bar .stat-label { font-size: 11px; color: #666; }
  .clickable-stat { cursor: pointer; border-radius: 6px; padding: 4px 8px; transition: background .15s; }
  .clickable-stat:hover { background: #e2e8f0; }

  .sub-bar {
    padding: 6px 20px;
    font-size: 12px; color: #777;
    background: #f5f6f8;
    border-bottom: 1px solid #eee;
  }

  .table-wrap { overflow-x: auto; padding: 0 20px 40px; }
  table {
    width: 100%; border-collapse: collapse;
    background: #fff;
    box-shadow: 0 1px 3px rgba(0,0,0,.08);
    border-radius: 6px; overflow: hidden; min-width: 700px;
    margin-top: 12px;
  }
  thead th {
    background: #eef1f5; text-align: left;
    padding: 9px 12px; font-weight: 600; font-size: 12px; color: #555;
    border-bottom: 1px solid #dde1e7;
    cursor: pointer; user-select: none; white-space: nowrap;
  }
  thead th:hover { background: #e2e6ed; }
  thead th.sorted-asc::after  { content: " ▲"; }
  thead th.sorted-desc::after { content: " ▼"; }
  tbody tr:nth-child(even) { background: #fafbfc; }
  tbody tr:hover { background: #eef4ff; }
  td { padding: 8px 12px; border-bottom: 1px solid #eee; vertical-align: middle; }
  .num { text-align: right; font-variant-numeric: tabular-nums; white-space: nowrap; }

  .badge {
    display: inline-block; padding: 2px 7px;
    border-radius: 10px; font-size: 11px; font-weight: 600; white-space: nowrap;
  }
  .b-sen   { background: #dbeafe; color: #1d4ed8; }
  .b-jun   { background: #e0e7ff; color: #4338ca; }
  .b-gen   { background: #dcfce7; color: #15803d; }
  .b-star  { background: #fef9c3; color: #854d0e; }
  .b-same  { background: #fce7f3; color: #9d174d; }
  .b-add   { background: #dcfce7; color: #15803d; }
  .b-del   { background: #fee2e2; color: #b91c1c; }
  .b-up    { background: #fee2e2; color: #b91c1c; }
  .b-down  { background: #dbeafe; color: #1d4ed8; }
  .b-other { background: #f3f4f6; color: #6b7280; }

  .up   { color: #b91c1c; font-weight: 600; }
  .down { color: #1d4ed8; font-weight: 600; }
  .same-label { color: #9d174d; font-weight: 600; }

  .empty { text-align: center; padding: 40px; color: #aaa; display: none; }
  .panel { display: none; }
  .panel.active { display: block; }

  /* ===== モバイル ===== */
  @media (max-width: 640px) {
    header { padding: 10px 14px; }
    header h1 { font-size: 16px; }

    #tabs { padding: 0 4px; overflow-x: auto; }
    .tab-btn { padding: 10px 14px; font-size: 13px; }

    .controls {
      padding: 8px 12px;
      flex-direction: column;
      align-items: stretch;
      gap: 8px;
    }
    .controls input[type=text],
    .controls select { width: 100%; font-size: 16px; }
    .spacer { display: none; }

    .stats-bar {
      padding: 8px 12px; gap: 6px;
      justify-content: space-around;
    }
    .stats-bar .stat-num { font-size: 26px; }
    .stats-bar .stat-label { font-size: 10px; text-align: center; }
    .clickable-stat { padding: 6px 4px; }

    .sub-bar { padding: 5px 12px; }

    /* テーブル → カード形式 */
    .table-wrap { padding: 8px 12px 40px; }
    table, thead, tbody, tr, th, td { display: block; }
    thead { display: none; }
    table { box-shadow: none; background: transparent; min-width: unset; margin-top: 0; }

    tbody tr {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 3px rgba(0,0,0,.08);
      margin-bottom: 10px;
      padding: 10px 12px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 2px 8px;
      border: none;
    }
    tbody td {
      padding: 2px 0;
      border: none;
      font-size: 13px;
    }
    /* カード内の役割をdata属性で制御 */
    td.card-main  { font-weight: 600; font-size: 14px; grid-column: 1; }
    td.card-sub   { color: #666; font-size: 12px; grid-column: 1; }
    td.card-price { text-align: right; font-weight: 700; font-size: 15px; grid-column: 2; grid-row: 1 / 3; align-self: center; }
    td.card-badge { grid-column: 1; }
    td.card-diff  { grid-column: 2; text-align: right; font-size: 13px; align-self: end; }
    .hide-sp { display: none; }
    td.card-names { display: block !important; grid-column: 1 / -1; padding-top: 4px; border-top: 1px solid #f0f0f0; margin-top: 2px; }
    td.card-names div { white-space: normal !important; font-size: 11px; }
  }
</style>
</head>
<body>

<header>
  <h1>薬価基準ビューア</h1>
  <p>厚生労働省 薬価基準収載品目リストをもとに自動生成</p>
</header>

<div id="tabs">
  <button class="tab-btn active" data-tab="compare">先発・後発の価格差</button>
  <button class="tab-btn" data-tab="diff">改定前後の変化</button>
  <button class="tab-btn" data-tab="list">薬価一覧</button>
</div>

<!-- ========== 先発・後発比較 ========== -->
<div id="panel-compare" class="panel active">
  <div class="controls">
    <input type="text" id="cq" placeholder="成分名・品名で検索...">
    <select id="ckubun">
      <option value="">区分：すべて</option>
      <option value="内用薬">内用薬</option>
      <option value="外用薬">外用薬</option>
      <option value="注射薬">注射薬</option>
      <option value="歯科用薬剤">歯科用薬剤</option>
    </select>
    <select id="ctype">
      <option value="loss">後発に切り替えると安くなる</option>
      <option value="">すべて表示</option>
      <option value="same">先発＝後発（同額）</option>
      <option value="rev">後発の方が高い</option>
      <option value="flipped">今回の改定で後発≧先発になった</option>
      <option value="restored">今回の改定で後発が先発より安くなった（逆転戻り）</option>
    </select>
    <div class="spacer"></div>
    <select id="compare-version"></select>
  </div>
  <div id="compare-stats" class="stats-bar"></div>
  <div id="compare-sub" class="sub-bar"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th data-ccol="kubun" class="hide-sp">区分</th>
        <th data-ccol="seibun">成分名</th>
        <th data-ccol="kikaku" class="hide-sp">規格</th>
        <th data-ccol="senpatu_hinmei">先発品名</th>
        <th data-ccol="senpatu_maker" class="hide-sp">メーカー</th>
        <th data-ccol="senpatu_yakka">先発薬価</th>
        <th data-ccol="kouhatsu_min">最安後発</th>
        <th class="hide-sp">後発品名（安い順）</th>
        <th data-ccol="diff">差額</th>
      </tr></thead>
      <tbody id="compare-tbody"></tbody>
    </table>
    <div class="empty" id="empty-compare">該当する品目がありません</div>
  </div>
</div>

<!-- ========== 改定前後の変化 ========== -->
<div id="panel-diff" class="panel">
  <div class="controls">
    <input type="text" id="dq" placeholder="品名・成分名で検索...">
    <select id="dkubun">
      <option value="">区分：すべて</option>
      <option value="内用薬">内用薬</option>
      <option value="外用薬">外用薬</option>
      <option value="注射薬">注射薬</option>
      <option value="歯科用薬剤">歯科用薬剤</option>
    </select>
    <select id="dtype">
      <option value="">変更種別：すべて</option>
      <option value="down">値下がり</option>
      <option value="up">値上がり</option>
      <option value="added">新規収載</option>
      <option value="removed">削除（保険適用外へ）</option>
    </select>
    <div class="spacer"></div>
    <select id="diff-version"></select>
  </div>
  <div id="diff-stats" class="stats-bar"></div>
  <div id="diff-sub" class="sub-bar"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th data-dcol="kubun" class="hide-sp">区分</th>
        <th data-dcol="seibun" class="hide-sp">成分名</th>
        <th data-dcol="hinmei">品名</th>
        <th data-dcol="kikaku" class="hide-sp">規格</th>
        <th data-dcol="maker" class="hide-sp">メーカー</th>
        <th class="hide-sp">種別</th>
        <th>変更</th>
        <th data-dcol="yakka_old">改定前</th>
        <th data-dcol="yakka">改定後</th>
        <th data-dcol="delta">差額</th>
      </tr></thead>
      <tbody id="diff-tbody"></tbody>
    </table>
    <div class="empty" id="empty-diff">該当する品目がありません</div>
  </div>
</div>

<!-- ========== 薬価一覧 ========== -->
<div id="panel-list" class="panel">
  <div class="controls">
    <input type="text" id="q" placeholder="品名・成分名・メーカー名で検索...">
    <select id="kubun">
      <option value="">区分：すべて</option>
      <option value="内用薬">内用薬</option>
      <option value="外用薬">外用薬</option>
      <option value="注射薬">注射薬</option>
      <option value="歯科用薬剤">歯科用薬剤</option>
    </select>
    <select id="kind">
      <option value="">種別：すべて</option>
      <option value="senpatu">先発品</option>
      <option value="junsenpatu">準先発品</option>
      <option value="kouhatsu">後発品</option>
      <option value="hoshi">後発品★（加算対象外）</option>
    </select>
    <div class="spacer"></div>
    <select id="version"></select>
  </div>
  <div id="list-sub" class="sub-bar"></div>
  <div class="table-wrap">
    <table>
      <thead><tr>
        <th data-col="kubun" class="hide-sp">区分</th>
        <th data-col="seibun">成分名</th>
        <th data-col="hinmei">品名</th>
        <th data-col="kikaku" class="hide-sp">規格</th>
        <th data-col="maker" class="hide-sp">メーカー</th>
        <th>種別</th>
        <th data-col="yakka">薬価</th>
      </tr></thead>
      <tbody id="list-tbody"></tbody>
    </table>
    <div class="empty" id="empty-list">該当する品目がありません</div>
  </div>
</div>

<script>
const PAGE = 200;

// ===== タブ =====
document.querySelectorAll(".tab-btn").forEach(btn =>
  btn.addEventListener("click", () => {
    document.querySelectorAll(".tab-btn").forEach(b => b.classList.remove("active"));
    document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
    btn.classList.add("active");
    document.getElementById("panel-" + btn.dataset.tab).classList.add("active");
  })
);

// ===== 共通ユーティリティ =====
function kindOf(r) {
  if (r.senpatu === "先発品")   return "senpatu";
  if (r.senpatu === "準先発品") return "junsenpatu";
  if (r.kouhatsu === "後発品")  return "kouhatsu";
  if (r.kouhatsu === "★")       return "hoshi";
  return "other";
}
function kindBadge(r) {
  const map = { senpatu:["b-sen","先発品"], junsenpatu:["b-jun","準先発品"],
                kouhatsu:["b-gen","後発品"], hoshi:["b-star","後発品★"], other:["",""] };
  const [cls, label] = map[kindOf(r)];
  return label ? `<span class="badge ${cls}">${label}</span>` : "";
}
function sortRows(arr, col, dir) {
  return [...arr].sort((a, b) => {
    const av = a[col] ?? "", bv = b[col] ?? "";
    if (typeof av === "number") return (av - bv) * dir;
    return String(av).localeCompare(String(bv), "ja") * dir;
  });
}
function makeSortHandler(getFiltered, setFiltered, render, panelSel, state) {
  document.querySelectorAll(`${panelSel} thead th[data-${state.attr}]`).forEach(th => {
    th.addEventListener("click", () => {
      const col = th.dataset[state.attr.replace(/-([a-z])/g, (_, c) => c.toUpperCase())];
      if (state.col === col) state.dir *= -1; else { state.col = col; state.dir = 1; }
      document.querySelectorAll(`${panelSel} thead th`).forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
      th.classList.add(state.dir === 1 ? "sorted-asc" : "sorted-desc");
      setFiltered(sortRows(getFiltered(), col, state.dir));
      state.page = 0;
      render();
    });
  });
}

window.addEventListener("scroll", () => {
  if (window.innerHeight + window.scrollY < document.body.offsetHeight - 300) return;
  if ((cmpState.page + 1) * PAGE < cmpFiltered.length) { cmpState.page++; renderCompare(); }
  if ((diffState.page + 1) * PAGE < diffFiltered.length) { diffState.page++; renderDiff(); }
  if ((listState.page + 1) * PAGE < listFiltered.length) { listState.page++; renderList(); }
});

function genNames(list) {
  if (!list || list.length === 0) return "—";
  return list.map(g =>
    `<div style="font-size:12px;white-space:nowrap">${g.hinmei} <span style="color:#888">${g.yakka.toFixed(1)}円</span></div>`
  ).join("");
}

// ===== 先発・後発比較 =====
const COMPARES = [
  { label: "2026年4月1日",  file: "data/compare_20260401.json",
    deltaFile: "data/compare_delta_20260318_20260401.json" },
  { label: "2026年3月18日", file: "data/compare_20260318.json", deltaFile: null },
];
let compareRows = [], flippedRows = [], restoredRowsG = [], cmpFiltered = [];
const cmpState = { col: "diff", dir: -1, page: 0, attr: "ccol" };

async function loadCompare(entry) {
  const json = await fetch(entry.file).then(r => r.json());
  compareRows = json.rows;
  let flippedRows2 = [], restoredRows = [];
  if (entry.deltaFile) {
    const delta = await fetch(entry.deltaFile).then(r => r.json());
    flippedRows2 = delta.flipped  || [];
    restoredRows = delta.restored || [];
  }
  flippedRows   = flippedRows2;
  restoredRowsG = restoredRows;

  const loss     = compareRows.filter(r => r.diff > 0).length;
  const same     = compareRows.filter(r => r.dougaku).length;
  const rev      = compareRows.filter(r => r.diff < 0).length;
  const nFlipped = flippedRows.length;
  const nRestored= restoredRows.length;
  document.getElementById("compare-stats").innerHTML = `
    <div class="stat clickable-stat" data-filter="loss"><span class="stat-num">${loss}</span><span class="stat-label">後発に切替で節約できる</span></div>
    <div class="stat clickable-stat" data-filter="same"><span class="stat-num">${same}</span><span class="stat-label">先発＝後発（同額）</span></div>
    <div class="stat clickable-stat" data-filter="rev"><span class="stat-num">${rev}</span><span class="stat-label">後発の方が高い</span></div>
    ${nFlipped  ? `<div class="stat clickable-stat" data-filter="flipped"  style="border-left:3px solid #b91c1c;padding-left:12px"><span class="stat-num" style="color:#b91c1c">${nFlipped}</span><span class="stat-label" style="color:#b91c1c;font-weight:600">今回から後発≧先発 ▶</span></div>` : ""}
    ${nRestored ? `<div class="stat clickable-stat" data-filter="restored" style="border-left:3px solid #1d4ed8;padding-left:12px"><span class="stat-num" style="color:#1d4ed8">${nRestored}</span><span class="stat-label" style="color:#1d4ed8;font-weight:600">今回から後発が再び安く ▶</span></div>` : ""}
  `;
  document.querySelectorAll(".clickable-stat").forEach(el => {
    el.addEventListener("click", () => {
      document.getElementById("ctype").value = el.dataset.filter;
      applyCompareFilter();
    });
  });
  applyCompareFilter();
}

function applyCompareFilter() {
  const q     = document.getElementById("cq").value.trim().toLowerCase();
  const kubun = document.getElementById("ckubun").value;
  const ctype = document.getElementById("ctype").value;

  // flipped/restoredモードは別データソースを使う
  const source = ctype === "flipped" ? flippedRows
               : ctype === "restored" ? restoredRowsG
               : compareRows;

  let rows = source.filter(r => {
    if (kubun && r.kubun !== kubun) return false;
    if (ctype === "loss" && r.diff <= 0) return false;
    if (ctype === "same" && !r.dougaku) return false;
    if (ctype === "rev"  && r.diff >= 0) return false;
    if (q && !(r.seibun + (r.senpatu_hinmei||"")).toLowerCase().includes(q)) return false;
    return true;
  });
  cmpFiltered = cmpState.col ? sortRows(rows, cmpState.col, cmpState.dir) : rows;
  cmpState.page = 0;
  renderCompare();
}

function renderCompare() {
  const ctype = document.getElementById("ctype").value;
  const isFlipped = ctype === "flipped" || ctype === "restored";
  const slice = cmpFiltered.slice(0, (cmpState.page + 1) * PAGE);
  document.getElementById("compare-sub").textContent = `${cmpFiltered.length.toLocaleString()} 件表示`;
  document.getElementById("compare-tbody").innerHTML = slice.map(r => {
    const senOld = isFlipped ? r.old_senpatu : null;
    const senNew = isFlipped ? r.new_senpatu : r.senpatu_yakka;
    const genOld = isFlipped ? r.old_kouhatsu_min : null;
    const genNew = isFlipped ? r.new_kouhatsu_min : r.kouhatsu_min;
    const diff   = isFlipped ? r.new_diff : r.diff;

    const senCell = isFlipped
      ? `<span class="down">${senOld?.toFixed(1)}</span> → <b>${senNew?.toFixed(1)} 円</b>`
      : `${senNew?.toFixed(1)} 円`;
    const genCell = isFlipped
      ? `<span class="down">${genOld?.toFixed(1)}</span> → <b>${genNew?.toFixed(1)} 円</b>`
      : `${genNew?.toFixed(1)} 円`;

    let diffCell;
    if (diff === 0 || r.dougaku) {
      diffCell = `<span class="same-label">同額</span>`;
    } else if (diff > 0) {
      diffCell = `<span class="up">+${diff.toFixed(1)} 円</span>`;
    } else {
      diffCell = `<span class="down">${diff.toFixed(1)} 円</span>`;
    }
    const typeLabel = r.senpatu_type === "準先発品"
      ? `<span class="badge b-jun">準先発品</span>` : `<span class="badge b-sen">先発品</span>`;
    return `<tr>
      <td class="hide-sp">${r.kubun}</td>
      <td class="card-main">${r.seibun} <span style="font-weight:400;color:#888;font-size:12px">${r.kikaku}</span></td>
      <td class="hide-sp">${r.kikaku}</td>
      <td class="card-sub">${r.senpatu_hinmei} ${typeLabel}</td>
      <td class="hide-sp">${r.senpatu_maker}</td>
      <td class="num card-price">${senCell}</td>
      <td class="num">最安後発 ${genCell}</td>
      <td class="hide-sp card-names">${genNames(r.kouhatsu_list)}</td>
      <td class="num card-diff">${diffCell}</td>
    </tr>`;
  }).join("");
  document.getElementById("empty-compare").style.display = cmpFiltered.length === 0 ? "block" : "none";
}

["cq","ckubun","ctype"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyCompareFilter);
  document.getElementById(id).addEventListener("change", applyCompareFilter);
});
document.querySelectorAll("#panel-compare thead th[data-ccol]").forEach(th =>
  th.addEventListener("click", () => {
    const col = th.dataset.ccol;
    if (cmpState.col === col) cmpState.dir *= -1; else { cmpState.col = col; cmpState.dir = 1; }
    document.querySelectorAll("#panel-compare thead th").forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
    th.classList.add(cmpState.dir === 1 ? "sorted-asc" : "sorted-desc");
    applyCompareFilter();
  })
);
const cmpVerSel = document.getElementById("compare-version");
COMPARES.forEach((c, i) => { const o = document.createElement("option"); o.value=i; o.textContent=c.label; cmpVerSel.appendChild(o); });
cmpVerSel.addEventListener("change", () => loadCompare(COMPARES[+cmpVerSel.value]));
loadCompare(COMPARES[0]);

// ===== 改定前後の変化 =====
const DIFFS = [
  { label: "2026年3月18日 → 4月1日", file: "data/diff_20260318_20260401.json" },
];
let diffRows = [], diffFiltered = [];
const diffState = { col: null, dir: 1, page: 0 };

function diffTypeOf(r) {
  if (r._type === "added")   return "added";
  if (r._type === "removed") return "removed";
  if (r.changes?.yakka) return r.changes.yakka.new > r.changes.yakka.old ? "up" : "down";
  return "other";
}
const diffBadgeMap = {
  added: ["b-add","新規収載"], removed: ["b-del","削除"],
  up:    ["b-up","値上がり"],  down:   ["b-down","値下がり"],
  other: ["b-other","その他"],
};

async function loadDiff(file) {
  const data = await fetch(file).then(r => r.json());
  const enrich = (r, type) => {
    const yakka_old = r.changes?.yakka?.old ?? r.yakka ?? null;
    const delta = r.changes?.yakka ? r.changes.yakka.new - r.changes.yakka.old : null;
    return { ...r, _type: type, yakka_old, delta };
  };
  diffRows = [
    ...data.added.map(r   => enrich(r, "added")),
    ...data.removed.map(r => enrich(r, "removed")),
    ...data.changed.map(r => enrich(r, "changed")),
  ];
  const down = data.changed.filter(r => r.changes.yakka?.new < r.changes.yakka?.old).length;
  const up   = data.changed.filter(r => r.changes.yakka?.new > r.changes.yakka?.old).length;
  document.getElementById("diff-stats").innerHTML = `
    <div class="stat"><span class="stat-num">${down}</span><span class="stat-label">値下がり</span></div>
    <div class="stat"><span class="stat-num">${up}</span><span class="stat-label">値上がり</span></div>
    <div class="stat"><span class="stat-num">${data.added.length}</span><span class="stat-label">新規収載</span></div>
    <div class="stat"><span class="stat-num">${data.removed.length}</span><span class="stat-label">削除（保険適用外へ）</span></div>
  `;
  applyDiffFilter();
}

function applyDiffFilter() {
  const q     = document.getElementById("dq").value.trim().toLowerCase();
  const kubun = document.getElementById("dkubun").value;
  const type  = document.getElementById("dtype").value;
  let rows = diffRows.filter(r => {
    if (kubun && r.kubun !== kubun) return false;
    if (type  && diffTypeOf(r) !== type) return false;
    if (q && !(r.hinmei + r.seibun).toLowerCase().includes(q)) return false;
    return true;
  });
  diffFiltered = diffState.col ? sortRows(rows, diffState.col, diffState.dir) : rows;
  diffState.page = 0;
  renderDiff();
}

function renderDiff() {
  const slice = diffFiltered.slice(0, (diffState.page + 1) * PAGE);
  document.getElementById("diff-sub").textContent = `${diffFiltered.length.toLocaleString()} 件表示`;
  document.getElementById("diff-tbody").innerHTML = slice.map(r => {
    const [cls, label] = diffBadgeMap[diffTypeOf(r)];
    const oldCell = r._type === "added"   ? "—" : (r.yakka_old?.toFixed(1) + " 円" ?? "—");
    const newCell = r._type === "removed" ? "—" : (r.yakka?.toFixed(1)     + " 円" ?? "—");
    let deltaCell = "—";
    if (r.delta != null) {
      const sign = r.delta > 0 ? "+" : "";
      deltaCell = `<span class="${r.delta > 0 ? "up" : "down"}">${sign}${r.delta.toFixed(1)}</span>`;
    }
    return `<tr>
      <td class="hide-sp">${r.kubun}</td>
      <td class="hide-sp">${r.seibun}</td>
      <td class="card-main">${r.hinmei}</td>
      <td class="hide-sp">${r.kikaku}</td>
      <td class="hide-sp">${r.maker}</td>
      <td class="hide-sp">${kindBadge(r)}</td>
      <td class="card-badge"><span class="badge ${cls}">${label}</span></td>
      <td class="num card-price">${newCell}</td>
      <td class="num card-sub">前回 ${oldCell}</td>
      <td class="num card-diff">${deltaCell}</td>
    </tr>`;
  }).join("");
  document.getElementById("empty-diff").style.display = diffFiltered.length === 0 ? "block" : "none";
}

["dq","dkubun","dtype"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyDiffFilter);
  document.getElementById(id).addEventListener("change", applyDiffFilter);
});
document.querySelectorAll("#panel-diff thead th[data-dcol]").forEach(th =>
  th.addEventListener("click", () => {
    const col = th.dataset.dcol;
    if (diffState.col === col) diffState.dir *= -1; else { diffState.col = col; diffState.dir = 1; }
    document.querySelectorAll("#panel-diff thead th").forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
    th.classList.add(diffState.dir === 1 ? "sorted-asc" : "sorted-desc");
    applyDiffFilter();
  })
);
const diffVerSel = document.getElementById("diff-version");
DIFFS.forEach(d => { const o = document.createElement("option"); o.value=d.file; o.textContent=d.label; diffVerSel.appendChild(o); });
diffVerSel.addEventListener("change", () => loadDiff(diffVerSel.value));
loadDiff(DIFFS[0].file);

// ===== 薬価一覧 =====
const VERSIONS = [
  { label: "2026年4月1日",  file: "data/yakka_20260401.json" },
  { label: "2026年3月18日", file: "data/yakka_20260318.json" },
];
let allRecords = [], listFiltered = [];
const listState = { col: null, dir: 1, page: 0 };

async function loadVersion(file) {
  const json = await fetch(file).then(r => r.json());
  allRecords = json.records;
  applyListFilter();
}

function applyListFilter() {
  const q     = document.getElementById("q").value.trim().toLowerCase();
  const kubun = document.getElementById("kubun").value;
  const kind  = document.getElementById("kind").value;
  let rows = allRecords.filter(r => {
    if (kubun && r.kubun !== kubun) return false;
    if (kind  && kindOf(r) !== kind) return false;
    if (q && !(r.hinmei + r.seibun + r.maker).toLowerCase().includes(q)) return false;
    return true;
  });
  listFiltered = listState.col ? sortRows(rows, listState.col, listState.dir) : rows;
  listState.page = 0;
  renderList();
}

function renderList() {
  const slice = listFiltered.slice(0, (listState.page + 1) * PAGE);
  document.getElementById("list-sub").textContent =
    `${listFiltered.length.toLocaleString()} 件 / 全 ${allRecords.length.toLocaleString()} 件`;
  document.getElementById("list-tbody").innerHTML = slice.map(r => `<tr>
    <td class="hide-sp">${r.kubun}</td>
    <td class="card-main">${r.hinmei}</td>
    <td class="card-sub">${r.seibun} <span style="color:#aaa">${r.kikaku}</span></td>
    <td class="hide-sp">${r.kikaku}</td>
    <td class="hide-sp">${r.maker}</td>
    <td class="card-badge">${kindBadge(r)}</td>
    <td class="num card-price">${r.yakka != null ? r.yakka.toFixed(1) + " 円" : ""}</td>
  </tr>`).join("");
  document.getElementById("empty-list").style.display = listFiltered.length === 0 ? "block" : "none";
}

["q","kubun","kind"].forEach(id => {
  document.getElementById(id).addEventListener("input", applyListFilter);
  document.getElementById(id).addEventListener("change", applyListFilter);
});
document.querySelectorAll("#panel-list thead th[data-col]").forEach(th =>
  th.addEventListener("click", () => {
    const col = th.dataset.col;
    if (listState.col === col) listState.dir *= -1; else { listState.col = col; listState.dir = 1; }
    document.querySelectorAll("#panel-list thead th").forEach(t => t.classList.remove("sorted-asc","sorted-desc"));
    th.classList.add(listState.dir === 1 ? "sorted-asc" : "sorted-desc");
    applyListFilter();
  })
);
const verSel = document.getElementById("version");
VERSIONS.forEach(v => { const o = document.createElement("option"); o.value=v.file; o.textContent=v.label; verSel.appendChild(o); });
verSel.addEventListener("change", () => loadVersion(verSel.value));
loadVersion(VERSIONS[0].file);
</script>
