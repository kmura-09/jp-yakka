name: 薬価データ更新

on:
  schedule:
    - cron: "0 2 1 * *"  # 毎月1日 AM2:00 JST(UTC+9→UTC-9h)
  workflow_dispatch:       # 手動実行も可

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install openpyxl

      - name: クロール＆パース
        run: python3 scripts/crawl.py . docs/data

      - name: 変更があればコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/*.json
          git diff --cached --quiet || git commit -m "chore: 薬価データ更新 $(date +'%Y-%m-%d')"
          git push
